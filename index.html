<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holidola Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            min-height: 100vh;
            padding: 16px;
            color: white;
        }

        /* Анимация загрузки HG */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        .hg-logo { font-size: 80px; font-weight: 900; letter-spacing: 10px; }
        .hg-letter-h { display: inline-block; color: #ff3333; animation: fillH 1.2s ease forwards; }
        .hg-letter-g { display: inline-block; color: #3399ff; animation: fillG 1.2s ease forwards 0.2s; }
        @keyframes fillH {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #ff3333; }
        }
        @keyframes fillG {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #3399ff; }
        }

        .main-content { opacity: 0; transition: opacity 0.8s ease; }

        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .balance-card {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            border-radius: 20px;
            padding: 6px 18px;
            text-align: center;
        }
        .balance-label { font-size: 10px; color: #333; }
        .balance-value { font-size: 24px; font-weight: bold; color: #000; }
        .stats { display: flex; gap: 15px; }
        .stat-label { font-size: 10px; color: #aaa; }
        .stat-value { font-size: 16px; font-weight: bold; }

        /* Переключение игр */
        .game-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .game-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            cursor: pointer;
        }
        .game-btn.active {
            background: linear-gradient(135deg, #ff4d4d, #ff6b6b);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.5);
        }

        /* Игровая зона */
        .game-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        canvas {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            margin-bottom: 20px;
        }
        .countdown {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffaa33;
        }
        .multiplier-display {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #ffd966;
            margin-bottom: 15px;
        }
        .bet-control {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .bet-preset {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px 18px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .bet-preset.active {
            background: #ffaa33;
            color: #000;
        }
        .bet-control input {
            width: 120px;
            padding: 10px;
            border-radius: 30px;
            border: none;
            text-align: center;
            background: rgba(0,0,0,0.5);
            color: white;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-start { background: #4caf50; color: white; }
        .btn-cashout { background: #ff9800; color: white; }
        .btn-back { background: rgba(255,255,255,0.2); color: white; margin-bottom: 15px; }

        /* Список участников */
        .participants {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 15px;
        }
        .participant-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e1e3e;
            border-radius: 30px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }
        .modal-content button {
            margin: 8px;
            padding: 10px 20px;
        }
        .hidden { display: none; }
        .flex { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="hg-logo"><span class="hg-letter-h">H</span><span class="hg-letter-g">G</span></div>
</div>

<div class="main-content" id="mainContent">
    <div class="header" id="balanceHeader">
        <div class="stats">
            <div class="stat"><div class="stat-label">ИГР</div><div class="stat-value" id="gamesPlayed">0</div></div>
            <div class="stat"><div class="stat-label">ПОБЕД</div><div class="stat-value" id="gamesWon">0</div></div>
        </div>
        <div class="balance-card">
            <div class="balance-label">⭐ БАЛАНС</div>
            <div class="balance-value" id="balance">100</div>
        </div>
    </div>

    <div class="game-selector">
        <button class="game-btn active" data-game="rocket">🚀 РАКЕТКА</button>
        <button class="game-btn" data-game="plane">✈️ САМОЛЁТИК</button>
    </div>

    <!-- Ракетка -->
    <div id="rocketGame">
        <div class="game-area">
            <div class="countdown" id="countdown">5</div>
            <canvas id="rocketCanvas" width="400" height="280"></canvas>
            <div class="multiplier-display" id="rocketMult">x1.00</div>
            <div class="bet-control">
                <button class="bet-preset" data-bet="5">5⭐</button>
                <button class="bet-preset" data-bet="10">10⭐</button>
                <button class="bet-preset" data-bet="50">50⭐</button>
                <button class="bet-preset" data-bet="100">100⭐</button>
                <button class="bet-preset" data-bet="250">250⭐</button>
                <button class="bet-preset" data-bet="500">500⭐</button>
                <input type="number" id="customBet" placeholder="Своя ставка" min="5" max="3000" step="1">
            </div>
            <div class="flex">
                <button class="btn-start" id="rocketStartBtn">СТАВИТЬ</button>
                <button class="btn-cashout hidden" id="rocketCashoutBtn">💰 ЗАБРАТЬ</button>
            </div>
            <div class="participants" id="participantsList">
                <div class="participant-item"><span>Участники</span><span>Ставка</span></div>
                <div class="participant-item" id="noParticipants">Нет активных игроков</div>
            </div>
        </div>
    </div>

    <!-- Самолётик -->
    <div id="planeGame" class="hidden">
        <div class="game-area">
            <canvas id="planeCanvas" width="400" height="280"></canvas>
            <div class="multiplier-display" id="planeMult">x1.00</div>
            <div class="bet-control">
                <button class="bet-preset" data-plane-bet="5">5⭐</button>
                <button class="bet-preset" data-plane-bet="10">10⭐</button>
                <button class="bet-preset" data-plane-bet="50">50⭐</button>
                <button class="bet-preset" data-plane-bet="100">100⭐</button>
                <input type="number" id="planeCustomBet" placeholder="Своя ставка" min="5" max="3000">
            </div>
            <div class="flex">
                <button class="btn-start" id="planeStartBtn">СТАВИТЬ</button>
                <button class="btn-start hidden" id="planeFlyBtn">✈️ ЛЕТЕТЬ</button>
                <button class="btn-cashout hidden" id="planeCashoutBtn">💰 ЗАБРАТЬ</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалки баланса -->
<div id="balanceModal" class="modal hidden">
    <div class="modal-content">
        <h3>Баланс: <span id="modalBalance">0</span>⭐</h3>
        <button id="depositBtn">💸 ПОПОЛНИТЬ</button>
        <button id="withdrawBtn">💎 ВЫВЕСТИ</button>
        <button id="closeModal">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="depositModal" class="modal hidden">
    <div class="modal-content">
        <h3>Пополнение</h3>
        <div class="flex">
            <button class="bet-preset" data-deposit="50">50⭐</button>
            <button class="bet-preset" data-deposit="250">250⭐</button>
            <button class="bet-preset" data-deposit="500">500⭐</button>
        </div>
        <input type="number" id="depositAmount" placeholder="Сумма" min="5">
        <button id="confirmDeposit">ПОПОЛНИТЬ</button>
        <button id="closeDeposit">НАЗАД</button>
    </div>
</div>

<div id="withdrawModal" class="modal hidden">
    <div class="modal-content">
        <h3>Вывод (от 100⭐)</h3>
        <input type="number" id="withdrawAmount" placeholder="Сумма" min="100">
        <button id="confirmWithdraw">ВЫВЕСТИ</button>
        <button id="closeWithdraw">НАЗАД</button>
    </div>
</div>

<script>
    // Анимация загрузки
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.opacity = '1';
        }, 800);
    }, 1400);

    // ========== ДАННЫЕ ==========
    let balance = 100;
    let gamesPlayed = 0;
    let gamesWon = 0;
    let participants = []; // { name, bet }

    // Ракетка
    let rocketActive = false;
    let rocketBet = 0;
    let rocketMult = 1.0;
    let rocketInterval = null;
    let countdownInterval = null;
    let rocketCountdown = 5;
    let rocketCtx, rocketCanvas;
    let rocketCrashPoint = 1.0;

    // Самолётик
    let planeActive = false;
    let planeBet = 0;
    let planeMult = 1.0;
    let planeInterval = null;
    let planeCtx, planeCanvas;

    // DOM
    const balanceSpan = document.getElementById('balance');
    const gamesPlayedSpan = document.getElementById('gamesPlayed');
    const gamesWonSpan = document.getElementById('gamesWon');

    function updateUI() {
        balanceSpan.innerText = balance;
        gamesPlayedSpan.innerText = gamesPlayed;
        gamesWonSpan.innerText = gamesWon;
        document.getElementById('modalBalance').innerText = balance;
    }

    // ========== РАКЕТКА (JetX) ==========
    function initRocketCanvas() {
        rocketCanvas = document.getElementById('rocketCanvas');
        rocketCtx = rocketCanvas.getContext('2d');
        rocketCanvas.width = rocketCanvas.clientWidth;
        rocketCanvas.height = rocketCanvas.clientHeight;
    }

    function drawRocket(mult) {
        if (!rocketCtx) return;
        const w = rocketCanvas.width;
        const h = rocketCanvas.height;
        rocketCtx.fillStyle = '#00000066';
        rocketCtx.fillRect(0, 0, w, h);
        const progress = Math.min(mult / 10, 0.9);
        const x = w * progress;
        const y = h - 40 - progress * 100;
        rocketCtx.fillStyle = '#ff6666';
        rocketCtx.beginPath();
        rocketCtx.moveTo(x, y);
        rocketCtx.lineTo(x - 15, y + 20);
        rocketCtx.lineTo(x + 15, y + 20);
        rocketCtx.fill();
        rocketCtx.fillStyle = '#ffaa33';
        rocketCtx.beginPath();
        rocketCtx.moveTo(x - 8, y + 20);
        rocketCtx.lineTo(x, y + 40);
        rocketCtx.lineTo(x + 8, y + 20);
        rocketCtx.fill();
    }

    function startCountdown() {
        rocketCountdown = 5;
        document.getElementById('countdown').innerText = rocketCountdown;
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(() => {
            rocketCountdown--;
            document.getElementById('countdown').innerText = rocketCountdown;
            if (rocketCountdown <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('countdown').innerText = 'GO!';
                startRocketFlight();
            }
        }, 1000);
    }

    function startRocketFlight() {
        rocketMult = 1.0;
        rocketActive = true;
        rocketCrashPoint = 1.0 + Math.random() * 8; // случайная точка взрыва от x1.1 до x9
        document.getElementById('rocketMult').innerText = `x${rocketMult.toFixed(2)}`;
        document.getElementById('rocketCashoutBtn').classList.remove('hidden');
        document.getElementById('rocketStartBtn').disabled = true;

        if (rocketInterval) clearInterval(rocketInterval);
        rocketInterval = setInterval(() => {
            if (!rocketActive) return;
            rocketMult += 0.03 + Math.random() * 0.05;
            document.getElementById('rocketMult').innerText = `x${rocketMult.toFixed(2)}`;
            drawRocket(rocketMult);
            if (rocketMult >= rocketCrashPoint) {
                // КРАШ
                clearInterval(rocketInterval);
                rocketActive = false;
                document.getElementById('rocketCashoutBtn').classList.add('hidden');
                document.getElementById('rocketStartBtn').disabled = false;
                updateUI();
                drawCrash();
                // Удаляем участника
                participants = participants.filter(p => p.bet !== rocketBet);
                updateParticipantsList();
                setTimeout(() => {
                    document.getElementById('countdown').innerText = '5';
                    startCountdown();
                }, 2000);
            }
        }, 100);
    }

    function drawCrash() {
        const w = rocketCanvas.width;
        const h = rocketCanvas.height;
        rocketCtx.fillStyle = '#ff0000aa';
        rocketCtx.fillRect(0, 0, w, h);
        rocketCtx.fillStyle = 'white';
        rocketCtx.font = 'bold 24px sans-serif';
        rocketCtx.fillText('💥 ВЗРЫВ 💥', w/2-70, h/2);
    }

    function rocketCashout() {
        if (!rocketActive) return;
        clearInterval(rocketInterval);
        const win = Math.floor(rocketBet * rocketMult);
        balance += win;
        gamesPlayed++;
        gamesWon++;
        updateUI();
        rocketActive = false;
        document.getElementById('rocketCashoutBtn').classList.add('hidden');
        document.getElementById('rocketStartBtn').disabled = false;
        drawWin(win);
        participants = participants.filter(p => p.bet !== rocketBet);
        updateParticipantsList();
        setTimeout(() => {
            document.getElementById('countdown').innerText = '5';
            startCountdown();
        }, 1500);
    }

    function drawWin(win) {
        const w = rocketCanvas.width;
        const h = rocketCanvas.height;
        rocketCtx.fillStyle = '#4caf5088';
        rocketCtx.fillRect(0, 0, w, h);
        rocketCtx.fillStyle = 'white';
        rocketCtx.font = 'bold 20px sans-serif';
        rocketCtx.fillText(`🎉 +${win}⭐ 🎉`, w/2-70, h/2);
    }

    function placeRocketBet() {
        let bet = parseInt(document.getElementById('customBet').value);
        if (isNaN(bet) || bet < 5) bet = 5;
        if (bet > 3000) bet = 3000;
        if (balance < bet) {
            alert(`Не хватает звезд! Баланс: ${balance}⭐`);
            return;
        }
        balance -= bet;
        rocketBet = bet;
        updateUI();
        participants.push({ name: `Игрок ${participants.length+1}`, bet: bet });
        updateParticipantsList();
        if (participants.length === 1) {
            startCountdown();
        }
    }

    function updateParticipantsList() {
        const container = document.getElementById('participantsList');
        if (participants.length === 0) {
            container.innerHTML = '<div class="participant-item">Нет активных игроков</div>';
            return;
        }
        let html = '<div class="participant-item"><span>Участник</span><span>Ставка</span></div>';
        participants.forEach(p => {
            html += `<div class="participant-item"><span>👤 ${p.name}</span><span>${p.bet}⭐</span></div>`;
        });
        container.innerHTML = html;
    }

    // ========== САМОЛЁТИК (Aviator) ==========
    function initPlaneCanvas() {
        planeCanvas = document.getElementById('planeCanvas');
        planeCtx = planeCanvas.getContext('2d');
        planeCanvas.width = planeCanvas.clientWidth;
        planeCanvas.height = planeCanvas.clientHeight;
    }

    function drawPlane(mult) {
        if (!planeCtx) return;
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#00000066';
        planeCtx.fillRect(0, 0, w, h);
        const progress = Math.min(mult / 10, 0.9);
        const x = w * progress;
        const y = h - 40 - progress * 80;
        planeCtx.fillStyle = '#66aaff';
        planeCtx.beginPath();
        planeCtx.moveTo(x, y);
        planeCtx.lineTo(x - 12, y + 15);
        planeCtx.lineTo(x + 12, y + 15);
        planeCtx.fill();
    }

    function startPlane() {
        let bet = parseInt(document.getElementById('planeCustomBet').value);
        if (isNaN(bet) || bet < 5) bet = 5;
        if (bet > 3000) bet = 3000;
        if (balance < bet) {
            alert(`Не хватает звезд! Баланс: ${balance}⭐`);
            return;
        }
        balance -= bet;
        planeBet = bet;
        planeMult = 1.0;
        planeActive = true;
        updateUI();
        document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
        document.getElementById('planeFlyBtn').classList.remove('hidden');
        document.getElementById('planeCashoutBtn').classList.remove('hidden');
        document.getElementById('planeStartBtn').disabled = true;
        if (planeInterval) clearInterval(planeInterval);
        planeInterval = setInterval(() => {
            if (!planeActive) return;
            planeMult += 0.05 + Math.random() * 0.1;
            document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
            drawPlane(planeMult);
            const crashChance = 0.03 + (planeMult - 1) * 0.025;
            if (Math.random() < crashChance && planeMult > 1.2) {
                clearInterval(planeInterval);
                planeActive = false;
                document.getElementById('planeFlyBtn').classList.add('hidden');
                document.getElementById('planeCashoutBtn').classList.add('hidden');
                document.getElementById('planeStartBtn').disabled = false;
                drawPlaneCrash();
                updateUI();
            }
        }, 300);
    }

    function planeFly() {
        if (!planeActive) return;
        planeMult += 0.2;
        document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
        drawPlane(planeMult);
    }

    function planeCashout() {
        if (!planeActive) return;
        clearInterval(planeInterval);
        const win = Math.floor(planeBet * planeMult);
        balance += win;
        gamesPlayed++;
        gamesWon++;
        updateUI();
        planeActive = false;
        document.getElementById('planeFlyBtn').classList.add('hidden');
        document.getElementById('planeCashoutBtn').classList.add('hidden');
        document.getElementById('planeStartBtn').disabled = false;
        drawPlaneWin(win);
    }

    function drawPlaneCrash() {
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#ff0000aa';
        planeCtx.fillRect(0, 0, w, h);
        planeCtx.fillStyle = 'white';
        planeCtx.font = 'bold 20px sans-serif';
        planeCtx.fillText('💥 КРАШ 💥', w/2-60, h/2);
    }

    function drawPlaneWin(win) {
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#4caf5088';
        planeCtx.fillRect(0, 0, w, h);
        planeCtx.fillStyle = 'white';
        planeCtx.font = 'bold 20px sans-serif';
        planeCtx.fillText(`🎉 +${win}⭐ 🎉`, w/2-70, h/2);
    }

    // ========== МОДАЛКИ БАЛАНСА ==========
    document.getElementById('balanceHeader').onclick = () => {
        document.getElementById('balanceModal').classList.remove('hidden');
    };
    document.getElementById('closeModal').onclick = () => {
        document.getElementById('balanceModal').classList.add('hidden');
    };
    document.getElementById('depositBtn').onclick = () => {
        document.getElementById('balanceModal').classList.add('hidden');
        document.getElementById('depositModal').classList.remove('hidden');
    };
    document.getElementById('withdrawBtn').onclick = () => {
        document.getElementById('balanceModal').classList.add('hidden');
        document.getElementById('withdrawModal').classList.remove('hidden');
    };
    document.getElementById('closeDeposit').onclick = () => {
        document.getElementById('depositModal').classList.add('hidden');
    };
    document.getElementById('closeWithdraw').onclick = () => {
        document.getElementById('withdrawModal').classList.add('hidden');
    };

    document.querySelectorAll('[data-deposit]').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('depositAmount').value = btn.dataset.deposit;
        };
    });

    document.getElementById('confirmDeposit').onclick = () => {
        let amount = parseInt(document.getElementById('depositAmount').value);
        if (isNaN(amount) || amount < 5) amount = 5;
        alert(`📱 Отправьте ${amount}⭐ боту @HolidolaGamesBot\nПосле подтверждения баланс пополнится`);
        document.getElementById('depositModal').classList.add('hidden');
    };

    document.getElementById('confirmWithdraw').onclick = () => {
        let amount = parseInt(document.getElementById('withdrawAmount').value);
        if (isNaN(amount) || amount < 100) {
            alert('Минимальный вывод 100⭐');
            return;
        }
        if (amount > balance) {
            alert('Недостаточно звезд');
            return;
        }
        alert(`Запрос на вывод ${amount}⭐ отправлен. Ожидайте перевод.`);
        balance -= amount;
        updateUI();
        document.getElementById('withdrawModal').classList.add('hidden');
    };

    // ========== ПЕРЕКЛЮЧЕНИЕ ИГР ==========
    function switchGame(game) {
        document.getElementById('rocketGame').classList.toggle('hidden', game !== 'rocket');
        document.getElementById('planeGame').classList.toggle('hidden', game !== 'plane');
        document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.game-btn[data-game="${game}"]`).classList.add('active');
        if (game === 'rocket') initRocketCanvas();
        else initPlaneCanvas();
    }

    document.querySelectorAll('.game-btn').forEach(btn => {
        btn.onclick = () => switchGame(btn.dataset.game);
    });

    // Кнопки ставок
    document.querySelectorAll('[data-bet]').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('customBet').value = btn.dataset.bet;
        };
    });
    document.querySelectorAll('[data-plane-bet]').forEach(btn => {
        btn.onclick = () => {
            document.getElementById('planeCustomBet').value = btn.dataset.bet;
        };
    });

    document.getElementById('rocketStartBtn').onclick = placeRocketBet;
    document.getElementById('rocketCashoutBtn').onclick = rocketCashout;
    document.getElementById('planeStartBtn').onclick = startPlane;
    document.getElementById('planeFlyBtn').onclick = planeFly;
    document.getElementById('planeCashoutBtn').onclick = planeCashout;

    initRocketCanvas();
    initPlaneCanvas();
    updateUI();
</script>
</body>
</html>
