<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holidola Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a3e 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        /* Анимация загрузки HG */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .hg-logo {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: 10px;
        }

        .hg-letter-h {
            display: inline-block;
            color: #ff3333;
            animation: fillH 1.2s ease forwards;
            text-shadow: 0 0 20px #ff3333;
        }

        .hg-letter-g {
            display: inline-block;
            color: #3399ff;
            animation: fillG 1.2s ease forwards 0.2s;
            text-shadow: 0 0 20px #3399ff;
        }

        @keyframes fillH {
            0% { opacity: 0; transform: scale(0.5); text-shadow: 0 0 0 #ff3333; }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 30px #ff3333; }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #ff3333; }
        }

        @keyframes fillG {
            0% { opacity: 0; transform: scale(0.5); text-shadow: 0 0 0 #3399ff; }
            50% { opacity: 1; transform: scale(1.2); text-shadow: 0 0 30px #3399ff; }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px #3399ff; }
        }

        /* Основной контент */
        .main-content {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* Заголовок */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .balance-card {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            border-radius: 20px;
            padding: 8px 20px;
            text-align: center;
        }

        .balance-label {
            font-size: 12px;
            color: #333;
        }

        .balance-value {
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #aaa;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }

        /* Меню игр — 2 карточки */
        .games-menu {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card {
            flex: 1;
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-5px);
        }

        /* Ракетка — красный фон */
        .rocket-card {
            background: linear-gradient(145deg, #ff4d4d, #cc3333);
            box-shadow: 0 10px 25px rgba(255, 77, 77, 0.3);
        }

        /* Самолётик — синий фон */
        .plane-card {
            background: linear-gradient(145deg, #3399ff, #2266cc);
            box-shadow: 0 10px 25px rgba(51, 153, 255, 0.3);
        }

        .game-icon {
            font-size: 60px;
            text-align: center;
            margin-bottom: 10px;
            height: 80px;
            position: relative;
        }

        .game-name {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .game-desc {
            font-size: 12px;
            text-align: center;
            opacity: 0.9;
        }

        /* Анимации для иконок игр */
        @keyframes rocketFly {
            0% { transform: translateX(-20px) translateY(0px) rotate(0deg); }
            50% { transform: translateX(20px) translateY(-10px) rotate(5deg); }
            100% { transform: translateX(-20px) translateY(0px) rotate(0deg); }
        }

        @keyframes bombDrop {
            0% { transform: translateX(30px) translateY(-50px); opacity: 1; }
            100% { transform: translateX(-30px) translateY(50px); opacity: 0; }
        }

        .rocket-animation {
            animation: rocketFly 1.5s infinite ease-in-out;
            display: inline-block;
        }

        .bomb-animation {
            position: absolute;
            right: 10px;
            top: 10px;
            animation: bombDrop 2s infinite;
            font-size: 24px;
        }

        @keyframes planeFly {
            0% { transform: translateX(-30px); }
            100% { transform: translateX(30px); }
        }

        @keyframes bombAttack {
            0% { transform: translateX(40px) translateY(-20px); opacity: 1; }
            100% { transform: translateX(-40px) translateY(30px); opacity: 0; }
        }

        .plane-animation {
            animation: planeFly 1.8s infinite alternate;
            display: inline-block;
        }

        .bomb-plane {
            position: absolute;
            right: 0;
            top: 20px;
            animation: bombAttack 2.2s infinite;
            font-size: 22px;
        }

        /* Множители */
        .multiplier-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 14px;
            font-weight: bold;
            backdrop-filter: blur(4px);
        }

        /* Игровая зона (скрыта, пока не выбран режим) */
        .game-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        /* Кнопки */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-start {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
        }

        .btn-cashout {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="loader-overlay" id="loader">
    <div class="hg-logo">
        <span class="hg-letter-h">H</span><span class="hg-letter-g">G</span>
    </div>
</div>

<div class="main-content" id="mainContent" style="opacity:0">
    <div class="header">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">ИГР</div>
                <div class="stat-value" id="gamesPlayed">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">ПОБЕД</div>
                <div class="stat-value" id="gamesWon">0</div>
            </div>
        </div>
        <div class="balance-card">
            <div class="balance-label">⭐ БАЛАНС</div>
            <div class="balance-value" id="balance">100</div>
        </div>
    </div>

    <!-- Меню выбора игр -->
    <div id="menu">
        <div class="games-menu">
            <div class="game-card rocket-card" id="rocketMenuBtn">
                <div class="game-icon">
                    <span class="rocket-animation">🚀</span>
                    <span class="bomb-animation">💣</span>
                </div>
                <div class="game-name">РАКЕТКА</div>
                <div class="game-desc">x1.5 ➔ x10 | Найди звёзды</div>
                <div class="multiplier-badge">x5.2</div>
            </div>

            <div class="game-card plane-card" id="planeMenuBtn">
                <div class="game-icon">
                    <span class="plane-animation">✈️</span>
                    <span class="bomb-plane">💣</span>
                </div>
                <div class="game-name">САМОЛЁТИК</div>
                <div class="game-desc">Лети выше | x1 ➔ x100</div>
                <div class="multiplier-badge">x5.2</div>
            </div>
        </div>
    </div>

    <!-- Ракетка (игровая зона) -->
    <div id="rocketGame" class="game-area hidden">
        <button class="btn-back" id="backFromRocket">← НАЗАД</button>
        <div class="grid-3x3" id="rocketGrid" style="display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px;"></div>
        <div class="multiplier" style="text-align:center; font-size:28px; font-weight:bold; color:#ffd966;">Множитель: <span id="rocketMult">x1.00</span></div>
        <div class="bet-control" style="display:flex; gap:12px; justify-content:center; margin:15px 0;">
            <input type="number" id="rocketBet" value="10" min="1" step="1" style="width:100px; padding:12px; border-radius:30px; border:none; text-align:center;">
            <button class="btn-start" id="rocketStartBtn">СТАВИТЬ</button>
        </div>
        <div id="rocketActions" class="hidden" style="display: flex; gap:12px; justify-content:center;">
            <button class="btn-cashout" id="rocketCashoutBtn">💰 ЗАБРАТЬ</button>
        </div>
    </div>

    <!-- Самолётик (игровая зона) -->
    <div id="planeGame" class="game-area hidden">
        <button class="btn-back" id="backFromPlane">← НАЗАД</button>
        <canvas id="planeCanvas" width="300" height="200" style="width:100%; background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 20px;"></canvas>
        <div class="multiplier" style="text-align:center; font-size:28px; font-weight:bold; color:#ffd966;">Множитель: <span id="planeMult">x1.00</span></div>
        <div class="bet-control" style="display:flex; gap:12px; justify-content:center; margin:15px 0;">
            <input type="number" id="planeBet" value="10" min="1" step="1" style="width:100px; padding:12px; border-radius:30px; border:none; text-align:center;">
            <button class="btn-start" id="planeStartBtn">СТАВИТЬ</button>
        </div>
        <div id="planeActions" class="hidden" style="display: flex; gap:12px; justify-content:center;">
            <button class="btn-start" id="planeFlyBtn">✈️ ЛЕТЕТЬ</button>
            <button class="btn-cashout" id="planeCashoutBtn">💰 ЗАБРАТЬ</button>
        </div>
    </div>
</div>

<script>
    // ========== АНИМАЦИЯ ЗАГРУЗКИ ==========
    setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.opacity = '1';
        }, 800);
    }, 1400);

    // ========== ДАННЫЕ ==========
    let balance = 100;
    let gamesPlayed = 0;
    let gamesWon = 0;

    let rocketActive = false;
    let rocketBet = 0;
    let rocketMult = 1.0;
    let rocketMines = [];
    let rocketRevealed = [];

    let planeActive = false;
    let planeBet = 0;
    let planeMult = 1.0;
    let planeInterval = null;
    let planeCanvas, planeCtx;

    // DOM
    const balanceSpan = document.getElementById('balance');
    const gamesPlayedSpan = document.getElementById('gamesPlayed');
    const gamesWonSpan = document.getElementById('gamesWon');

    function updateUI() {
        balanceSpan.innerText = balance;
        gamesPlayedSpan.innerText = gamesPlayed;
        gamesWonSpan.innerText = gamesWon;
    }

    // ========== РАКЕТКА ==========
    function initRocketGrid() {
        const grid = document.getElementById('rocketGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.style.cssText = 'aspect-ratio:1; background:rgba(255,255,255,0.1); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:32px; cursor:pointer; border:1px solid rgba(255,255,255,0.2);';
            cell.innerText = '❓';
            cell.onclick = () => rocketReveal(i);
            grid.appendChild(cell);
        }
    }

    function updateRocketGridUI() {
        const cells = document.querySelectorAll('#rocketGrid .cell');
        cells.forEach((cell, idx) => {
            if (rocketMines.includes(idx) && !rocketActive) {
                cell.style.background = '#4a0000';
                cell.innerText = '💣';
            } else if (rocketRevealed.includes(idx)) {
                cell.style.background = 'linear-gradient(135deg, #ffd700, #ffb347)';
                cell.innerText = '⭐';
            } else {
                cell.style.background = 'rgba(255,255,255,0.1)';
                cell.innerText = '❓';
            }
        });
        document.getElementById('rocketMult').innerText = `x${rocketMult.toFixed(2)}`;
    }

    function startRocket() {
        const bet = parseInt(document.getElementById('rocketBet').value);
        if (bet <= 0 || bet > balance) {
            alert(`Не хватает звезд! Баланс: ${balance}⭐`);
            return;
        }
        balance -= bet;
        gamesPlayed++;
        updateUI();

        rocketMines = [];
        while (rocketMines.length < 3) {
            const r = Math.floor(Math.random() * 9);
            if (!rocketMines.includes(r)) rocketMines.push(r);
        }
        rocketRevealed = [];
        rocketMult = 1.0;
        rocketBet = bet;
        rocketActive = true;

        updateRocketGridUI();
        document.getElementById('rocketActions').style.display = 'flex';
        document.getElementById('rocketStartBtn').disabled = true;
    }

    function rocketReveal(idx) {
        if (!rocketActive) return;
        if (rocketRevealed.includes(idx)) return;

        if (rocketMines.includes(idx)) {
            rocketActive = false;
            updateRocketGridUI();
            document.getElementById('rocketActions').style.display = 'none';
            document.getElementById('rocketStartBtn').disabled = false;
            updateUI();
            return;
        }

        rocketRevealed.push(idx);
        rocketMult = 1.0 + rocketRevealed.length * 0.4;
        updateRocketGridUI();

        const safeCells = [0,1,2,3,4,5,6,7,8].filter(i => !rocketMines.includes(i));
        if (rocketRevealed.length === safeCells.length) {
            const win = Math.floor(rocketBet * rocketMult);
            balance += win;
            gamesWon++;
            updateUI();
            rocketActive = false;
            document.getElementById('rocketActions').style.display = 'none';
            document.getElementById('rocketStartBtn').disabled = false;
            updateRocketGridUI();
        }
    }

    function rocketCashout() {
        if (!rocketActive) return;
        const win = Math.floor(rocketBet * rocketMult);
        balance += win;
        gamesWon++;
        updateUI();
        rocketActive = false;
        document.getElementById('rocketActions').style.display = 'none';
        document.getElementById('rocketStartBtn').disabled = false;
        updateRocketGridUI();
    }

    // ========== САМОЛЁТИК ==========
    function initPlaneCanvas() {
        planeCanvas = document.getElementById('planeCanvas');
        planeCtx = planeCanvas.getContext('2d');
        planeCanvas.width = planeCanvas.clientWidth;
        planeCanvas.height = planeCanvas.clientHeight;
        drawPlane(1.0);
    }

    function drawPlane(mult) {
        if (!planeCtx) return;
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#00000033';
        planeCtx.fillRect(0, 0, w, h);
        const progress = Math.min(mult / 5, 0.95);
        const x = progress * w;
        planeCtx.beginPath();
        planeCtx.moveTo(0, h - 30);
        planeCtx.lineTo(x, h - 30 - progress * 80);
        planeCtx.strokeStyle = '#ffd966';
        planeCtx.lineWidth = 3;
        planeCtx.stroke();
        planeCtx.fillStyle = '#ff6666';
        planeCtx.beginPath();
        planeCtx.moveTo(x, h - 30 - progress * 80);
        planeCtx.lineTo(x - 10, h - 25 - progress * 80);
        planeCtx.lineTo(x + 15, h - 30 - progress * 80);
        planeCtx.lineTo(x - 10, h - 35 - progress * 80);
        planeCtx.fill();
    }

    function startPlane() {
        const bet = parseInt(document.getElementById('planeBet').value);
        if (bet <= 0 || bet > balance) {
            alert(`Не хватает звезд! Баланс: ${balance}⭐`);
            return;
        }
        balance -= bet;
        gamesPlayed++;
        updateUI();

        planeBet = bet;
        planeMult = 1.0;
        planeActive = true;

        document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
        document.getElementById('planeActions').style.display = 'flex';
        document.getElementById('planeStartBtn').disabled = true;

        if (planeInterval) clearInterval(planeInterval);
        planeInterval = setInterval(() => {
            if (!planeActive) return;
            planeMult += 0.05 + Math.random() * 0.1;
            document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
            drawPlane(planeMult);
            const crashChance = 0.02 + (planeMult - 1) * 0.02;
            if (Math.random() < crashChance && planeMult > 1.2) {
                clearInterval(planeInterval);
                planeActive = false;
                document.getElementById('planeActions').style.display = 'none';
                document.getElementById('planeStartBtn').disabled = false;
                drawCrash();
                updateUI();
            }
        }, 400);
    }

    function drawCrash() {
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#ff000088';
        planeCtx.fillRect(0, 0, w, h);
        planeCtx.fillStyle = 'white';
        planeCtx.font = 'bold 20px sans-serif';
        planeCtx.fillText('💥 КРАШ 💥', w/2-60, h/2);
    }

    function planeCashout() {
        if (!planeActive) return;
        clearInterval(planeInterval);
        const win = Math.floor(planeBet * planeMult);
        balance += win;
        gamesWon++;
        updateUI();
        planeActive = false;
        document.getElementById('planeActions').style.display = 'none';
        document.getElementById('planeStartBtn').disabled = false;
        drawWin(win);
    }

    function drawWin(win) {
        const w = planeCanvas.width;
        const h = planeCanvas.height;
        planeCtx.fillStyle = '#4caf5088';
        planeCtx.fillRect(0, 0, w, h);
        planeCtx.fillStyle = 'white';
        planeCtx.font = 'bold 20px sans-serif';
        planeCtx.fillText(`🎉 +${win}⭐ 🎉`, w/2-70, h/2);
    }

    function planeFly() {
        if (!planeActive) return;
        planeMult += 0.2;
        document.getElementById('planeMult').innerText = `x${planeMult.toFixed(2)}`;
        drawPlane(planeMult);
    }

    // ========== НАВИГАЦИЯ ==========
    function showMenu() {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('rocketGame').classList.add('hidden');
        document.getElementById('planeGame').classList.add('hidden');
    }

    document.getElementById('rocketMenuBtn').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('rocketGame').classList.remove('hidden');
        initRocketGrid();
    };
    document.getElementById('planeMenuBtn').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('planeGame').classList.remove('hidden');
        initPlaneCanvas();
    };
    document.getElementById('backFromRocket').onclick = showMenu;
    document.getElementById('backFromPlane').onclick = showMenu;

    document.getElementById('rocketStartBtn').onclick = startRocket;
    document.getElementById('rocketCashoutBtn').onclick = rocketCashout;
    document.getElementById('planeStartBtn').onclick = startPlane;
    document.getElementById('planeCashoutBtn').onclick = planeCashout;
    document.getElementById('planeFlyBtn').onclick = planeFly;

    initRocketGrid();
    updateUI();
</script>
</body>
</html>
